<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}Train Ticket App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f8; color: #333; }

    .navbar {
      background: #1a73e8;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }
    .navbar a:hover { text-decoration: underline; }
    .navbar .brand { font-size: 1.3em; font-weight: bold; }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 { margin-bottom: 16px; color: #1a73e8; }
    h3 { margin: 16px 0 8px; }

    input[type=text], input[type=email],
    input[type=password], input[type=number],
    input[type=date], select, textarea {
      width: 100%;
      padding: 8px 12px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    button[type=submit], .btn {
      background: #1a73e8;
      color: white;
      padding: 10px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
    }
    button[type=submit]:hover { background: #1558b0; }
    button[disabled] {
      background: #ccc;
      cursor: not-allowed;
    }

    .messages p {
  padding: 12px 16px;
  border-radius: 6px;
  margin-bottom: 12px;
  font-weight: bold;
  border-left: 5px solid;
}
.messages p.success {
  background: #d4edda;
  color: #155724;
  border-color: #28a745;
}
.messages p.error {
  background: #f8d7da;
  color: #721c24;
  border-color: #dc3545;
}

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background: #1a73e8; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }

    a { color: #1a73e8; }
    hr { margin: 20px 0; border: none; border-top: 1px solid #ddd; }

    .badge-pending { color: orange; font-weight: bold; }
    .badge-confirmed { color: green; font-weight: bold; }
    .badge-cancelled { color: red; font-weight: bold; }
  </style>
</head>
<script>
  // Loading state on all submit buttons
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', function() {
      const btn = form.querySelector('button[type=submit]');
      if (btn) {
        btn.disabled = true;
        btn.innerText = '⏳ Please wait...';
      }
    });
  });
</script>
<body>

  {% if request.user.is_authenticated %}
  <div class="navbar">
    <span class="brand">🚆 Train Ticket App</span>
    <div>
      <a href="{% url 'dashboard' %}">🏠 Home</a>
      <a href="{% url 'profile' %}">👤 Profile</a>
      <a href="{% url 'wallet' %}">💰 Wallet</a>
      <a href="{% url 'bookings' %}">🎫 Bookings</a>
      <a href="{% url 'logout' %}">🚪 Logout</a>
    </div>
  </div>
  {% endif %}

  <div class="container">
    {% if messages %}
    <div class="messages">
      {% for msg in messages %}
        <p class="{{ msg.tags }}">{{ msg }}</p>
      {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>

</body>
</html>
